title: thumesn 札记
subtitle: 记录学习、笔记与生活
description: 记录学习、笔记与生活。
keywords:
  - 学习
  - 笔记
  - 博客
author: thumesn
language: zh-CN
timezone: Asia/Shanghai

url: https://thumesn.github.io
root: /
permalink: :year/:month/:day/:name/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude:
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: true

index_generator:
  path: ''
  per_page: 10
  order_by: -date

archive_generator:
  per_page: 10
  yearly: true
  monthly: true
  daily: false

tag_generator:
  per_page: 10

category_generator:
  per_page: 10

date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime
per_page: 10
pagination_dir: page

theme: stellar
theme_config:

avatar: /img/avatar.jpg
favicon: /img/favicon.ico

feed:
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content: true
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date

inject:
  head:
    - '<link rel="stylesheet" href="/css/stellar-custom.css">'
